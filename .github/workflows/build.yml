name: Build Fireaim C++

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libsdl2-dev libgl1-mesa-dev libglu1-mesa-dev freeglut-dev

      - name: Create build directory
        run: mkdir -p build

      - name: Configure with CMake
        working-directory: build
        run: cmake ..

      - name: Build
        working-directory: build
        run: make

      - name: Run tests
        working-directory: build
        run: ./test_game

      - name: Verify executable
        run: ls -la build/fireaim

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CMake
        uses: cmake-action/install@v1

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install sdl2 cmake

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ./build/test_game