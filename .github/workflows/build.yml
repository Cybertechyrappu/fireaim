name: Build Fireaim Android

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/wrapper-validation-action@v1

      - name: Download Gradle Wrapper
        run: |
          mkdir -p android/gradle/wrapper
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp
          /tmp/gradle-8.6/bin/gradle -p android wrapper

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fireaim-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk